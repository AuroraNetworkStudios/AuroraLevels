name: Upload Artifacts and Notify Discord

on:
  push:
    branches:
      - main
      - v2

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '9.6.0'

      - name: Build with Gradle
        run: gradle clean build -PbuildNumber=${{ github.run_number }}

      - name: Upload JAR Artifact
        id: upload-jar
        uses: actions/upload-artifact@v4
        with:
          name: AuroraLevels-${{ github.run_number }}
          path: build/libs/AuroraLevels-**.jar

      - name: Build changelog
        run: |
          jq '[.commits[] | {sha: .id, message: .message}]' "$GITHUB_EVENT_PATH" > commits.json
          jq -r '
            [
              .commits[] |
              "- " + (.message | gsub("\r\n"; "\n") | gsub("\n"; "\n  ")) + " (" + (.id[0:7]) + ")"
            ] | join("\n\n")
          ' "$GITHUB_EVENT_PATH" > changelog.txt
          if [ ! -s changelog.txt ]; then
            echo "Build ${{ github.run_number }}" > changelog.txt
          fi

      - name: Read release metadata
        run: |
          artifact_path=$(find build/libs -type f -name 'AuroraLevels-*.jar' | sort | head -n 1)
          if [ -z "$artifact_path" ]; then
            echo "::error::No AuroraLevels JAR found in build/libs"
            exit 1
          fi

          plugin_version=$(basename "$artifact_path" .jar)
          plugin_version=${plugin_version#AuroraLevels-}
          is_dev=true

          supported_minecraft_versions=$(
            awk -F= '{
              key = $1
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", key)
              if (key == "supportedMinecraftVersions") {
                print substr($0, index($0, "=") + 1)
                found = 1
                exit
              }
            } END {if (!found) print ""}' gradle.properties |
            jq -R -c 'split(",") | map(gsub("^[[:space:]]+|[[:space:]]+$"; "")) | map(select(length > 0))'
          )
          if [ "$supported_minecraft_versions" = "[]" ]; then
            echo "::error::supportedMinecraftVersions is empty in gradle.properties"
            exit 1
          fi
          jq -n \
            --arg artifactPath "$artifact_path" \
            --arg pluginVersion "$plugin_version" \
            --argjson isDev "$is_dev" \
            --argjson supportedMinecraftVersions "$supported_minecraft_versions" \
            '{
              artifact_path: $artifactPath,
              plugin_version: $pluginVersion,
              is_dev: $isDev,
              supported_minecraft_versions: $supportedMinecraftVersions
            }' > release-metadata.json

      - name: Upload to server
        run: |
          artifact_url="https://api.github.com/repos/${{ github.repository }}/actions/artifacts/${{ steps.upload-jar.outputs.artifact-id }}/zip"
          json_payload=$(jq -n \
                          --arg secret "${{ secrets.SERVER_SECRET }}" \
                          --arg repo "${{ github.repository }}" \
                          --arg artifactUrl "$artifact_url" \
                          --argjson buildNumber ${{ github.run_number }} \
                          --arg branch "${{ github.ref_name }}" \
                          --slurpfile commits commits.json \
                          --slurpfile releaseMetadata release-metadata.json \
                          '{
                            secret: $secret,
                            repo: $repo,
                            artifact_url: $artifactUrl,
                            build_number: $buildNumber,
                            branch: $branch,
                            commits: $commits[0],
                            supported_minecraft_versions: $releaseMetadata[0].supported_minecraft_versions
                          }')
          curl -X POST "${{ secrets.SERVER_UPLOAD_URL }}" -H "Content-Type: application/json" -d "$json_payload"

      - name: Upload to PixelEast
        env:
          PIXELEAST_TOKEN: ${{ secrets.PIXELEAST_TOKEN }}
        run: |
          if [ -z "$PIXELEAST_TOKEN" ]; then
            echo "::error::PIXELEAST_TOKEN secret is not configured"
            exit 1
          fi

          artifact_path=$(jq -r '.artifact_path' release-metadata.json)
          plugin_version=$(jq -r '.plugin_version' release-metadata.json)
          is_dev=$(jq -r '.is_dev' release-metadata.json)
          upload_url="https://api.pixeleast.com/v1/product/3348b84c-e329-461a-85c3-dafc3764cd43/versions"

          curl_args=(
            --fail-with-body
            --show-error
            --silent
            -X POST "$upload_url"
            -H "Authorization: Bearer $PIXELEAST_TOKEN"
            -H "Accept: application/json"
            -F "name=$plugin_version"
            -F "file=@$artifact_path"
            -F "changelog=<changelog.txt"
            -F "is_dev=$is_dev"
          )

          while IFS= read -r version_id; do
            curl_args+=(-F "selected_versions[]=$version_id")
          done < <(jq -r '.supported_minecraft_versions[]' release-metadata.json)

          curl "${curl_args[@]}"
